trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  acrName: 'interncicdacr'
  imageName: 'intern-cicd-app'
  imageTag: '$(Build.BuildId)'

steps:
- task: Docker@2
  displayName: Build and push image
  inputs:
    containerRegistry: 'intern-cicd-acr-connection'   # nama service connection Docker Registry yang barusan kamu buat
    repository: '$(imageName)'
    command: 'buildAndPush'
    Dockerfile: '**/Dockerfile'
    tags: |
      $(imageTag)
      latest

- task: AzureWebAppContainer@1
  displayName: Deploy to App Service
  inputs:
    azureSubscription: 'intern-cicd-arm-connection'   # ganti sesuai nama service connection ARM yang barusan berhasil
    appName: 'intern-cicd-webapp'
    containers: '$(intern-cicd-acr).azurecr.io/$(imageName):$(imageTag)'